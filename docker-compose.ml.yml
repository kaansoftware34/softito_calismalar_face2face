services:
  # --- ML Service 1: Sentiment Analysis ---
  ml-sentiment:
    build: ./services/sentiment
    container_name: ml-sentiment
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    restart: unless-stopped
    networks:
      - ml-shared-network

  # --- ML Service 2: Churn Prediction ---
  ml-churn:
    build: ./services/churn
    container_name: ml-churn
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - DATA_PATH=/data/online_retail.xlsx
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - ml-shared-network

  # --- ML Service 3: Product Recommendation ---
  ml-recommend:
    build: ./services/recommend
    container_name: ml-recommend
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - DATA_PATH=/data/online_retail.xlsx
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - ml-shared-network

  # --- ML Service 4: Sales Forecasting ---
  ml-forecast:
    build: ./services/forecast
    container_name: ml-forecast
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - DATA_PATH=/data/online_retail.xlsx
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - ml-shared-network

  # --- ML Service 5: Customer Segmentation ---
  ml-segmentation:
    build: ./services/segmentation
    container_name: ml-segmentation
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - DATA_PATH=/data/online_retail.xlsx
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - ml-shared-network

# Ortak ağı sisteme tanıtıyoruz
networks:
  ml-shared-network:
    name: ml-shared-network